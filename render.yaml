services:
  - type: web
    name: docuintel
    env: python
    region: oregon
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt && cd frontend && npm ci --omit=dev && npm run build
    startCommand: cd backend && gunicorn -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
